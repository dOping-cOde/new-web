<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="800" viewBox="0 0 1600 800" fill="none">
  <!-- Diagonal lines suggesting signal/communication — sweeping left-to-right at ~15° -->
  <!-- Lines are evenly spaced at 80px perpendicular intervals, spanning full canvas -->
  <!-- At 15° angle: for each line, offset by 80/cos(15°) ≈ 82.8px vertically -->

  <g stroke="#B8B4A8" stroke-width="1" opacity="0.20">
    <!-- Full-width diagonal lines at roughly 15° from horizontal -->
    <!-- Lines go from left edge (x=0) to right edge (x=1600) -->
    <!-- y-intercepts spaced ~85px apart; slope = tan(15°) ≈ 0.268, so dy over 1600px = 429px -->

    <line x1="-200" y1="-54" x2="1800" y2="483"/>
    <line x1="-200" y1="31" x2="1800" y2="568"/>
    <line x1="-200" y1="116" x2="1800" y2="653"/>
    <line x1="-200" y1="201" x2="1800" y2="738"/>
    <line x1="-200" y1="286" x2="1800" y2="823"/>
    <line x1="-200" y1="371" x2="1800" y2="908"/>
    <line x1="-200" y1="456" x2="1800" y2="993"/>
    <line x1="-200" y1="541" x2="1800" y2="1078"/>
    <line x1="-200" y1="626" x2="1800" y2="1163"/>
    <line x1="-200" y1="-139" x2="1800" y2="398"/>
    <line x1="-200" y1="-224" x2="1800" y2="313"/>
    <line x1="-200" y1="-309" x2="1800" y2="228"/>
    <line x1="-200" y1="-394" x2="1800" y2="143"/>
  </g>

  <!-- Every 4th line is slightly thicker for rhythm -->
  <g stroke="#B8B4A8" stroke-width="1.5" opacity="0.18">
    <line x1="-200" y1="116" x2="1800" y2="653"/>
    <line x1="-200" y1="371" x2="1800" y2="908"/>
    <line x1="-200" y1="-139" x2="1800" y2="398"/>
    <line x1="-200" y1="-394" x2="1800" y2="143"/>
  </g>

  <!-- Small dots at regular intervals along the lines to suggest data pulses -->
  <g fill="#B8B4A8" opacity="0.28">
    <!-- Row 1 (y≈116 at left → y≈653 at right) -->
    <circle cx="200" cy="170" r="2"/>
    <circle cx="500" cy="250" r="2"/>
    <circle cx="800" cy="330" r="2"/>
    <circle cx="1100" cy="410" r="2"/>
    <circle cx="1400" cy="490" r="2"/>

    <!-- Row 2 (y≈371 at left → y≈908 at right) -->
    <circle cx="100" cy="398" r="2"/>
    <circle cx="400" cy="478" r="2"/>
    <circle cx="700" cy="558" r="2"/>
    <circle cx="1000" cy="638" r="2"/>
    <circle cx="1300" cy="718" r="2"/>

    <!-- Row 3 (y≈−139 at left → y≈398 at right) -->
    <circle cx="300" cy="−58" r="2"/>
    <circle cx="600" cy="22" r="2"/>
    <circle cx="900" cy="102" r="2"/>
    <circle cx="1200" cy="182" r="2"/>
    <circle cx="1500" cy="262" r="2"/>

    <!-- Larger accent dots at wave crests -->
    <circle cx="400" cy="196" r="3"/>
    <circle cx="900" cy="356" r="3"/>
    <circle cx="1300" cy="462" r="3"/>
    <circle cx="200" cy="452" r="3"/>
    <circle cx="700" cy="612" r="3"/>
  </g>
</svg>
