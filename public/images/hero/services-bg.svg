<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="800" viewBox="0 0 1600 800" fill="none">
  <!-- Circuit/node pattern: nodes connected by orthogonal lines, suggesting interconnected AI capabilities -->
  <g stroke="#B8B4A8" stroke-width="1" opacity="0.28">
    <!-- Horizontal rails -->
    <line x1="0" y1="160" x2="1600" y2="160"/>
    <line x1="0" y1="320" x2="1600" y2="320"/>
    <line x1="0" y1="480" x2="1600" y2="480"/>
    <line x1="0" y1="640" x2="1600" y2="640"/>

    <!-- Vertical rails -->
    <line x1="200" y1="0" x2="200" y2="800"/>
    <line x1="400" y1="0" x2="400" y2="800"/>
    <line x1="600" y1="0" x2="600" y2="800"/>
    <line x1="800" y1="0" x2="800" y2="800"/>
    <line x1="1000" y1="0" x2="1000" y2="800"/>
    <line x1="1200" y1="0" x2="1200" y2="800"/>
    <line x1="1400" y1="0" x2="1400" y2="800"/>

    <!-- Short orthogonal connector traces — right-angle bends -->
    <!-- Top-left cluster -->
    <line x1="200" y1="80" x2="340" y2="80"/>
    <line x1="340" y1="80" x2="340" y2="160"/>

    <line x1="400" y1="240" x2="520" y2="240"/>
    <line x1="520" y1="240" x2="520" y2="320"/>

    <line x1="100" y1="320" x2="100" y2="420"/>
    <line x1="100" y1="420" x2="200" y2="420"/>

    <!-- Middle cluster -->
    <line x1="600" y1="200" x2="740" y2="200"/>
    <line x1="740" y1="200" x2="740" y2="320"/>

    <line x1="800" y1="100" x2="900" y2="100"/>
    <line x1="900" y1="100" x2="900" y2="160"/>

    <line x1="800" y1="400" x2="680" y2="400"/>
    <line x1="680" y1="400" x2="680" y2="480"/>

    <line x1="1000" y1="260" x2="1100" y2="260"/>
    <line x1="1100" y1="260" x2="1100" y2="320"/>

    <!-- Right cluster -->
    <line x1="1200" y1="140" x2="1320" y2="140"/>
    <line x1="1320" y1="140" x2="1320" y2="160"/>

    <line x1="1400" y1="380" x2="1500" y2="380"/>
    <line x1="1500" y1="380" x2="1500" y2="480"/>

    <line x1="1200" y1="560" x2="1080" y2="560"/>
    <line x1="1080" y1="560" x2="1080" y2="480"/>

    <!-- Bottom cluster -->
    <line x1="400" y1="560" x2="260" y2="560"/>
    <line x1="260" y1="560" x2="260" y2="640"/>

    <line x1="600" y1="700" x2="600" y2="640"/>
    <line x1="600" y1="700" x2="700" y2="700"/>

    <line x1="1000" y1="600" x2="1000" y2="640"/>
    <line x1="900" y1="640" x2="1000" y2="640"/>
  </g>

  <!-- Node circles at intersections -->
  <g fill="#B8B4A8" opacity="0.35">
    <!-- Grid intersections -->
    <circle cx="200" cy="160" r="3"/>
    <circle cx="400" cy="160" r="3"/>
    <circle cx="600" cy="160" r="3"/>
    <circle cx="800" cy="160" r="3"/>
    <circle cx="1000" cy="160" r="3"/>
    <circle cx="1200" cy="160" r="3"/>
    <circle cx="1400" cy="160" r="3"/>

    <circle cx="200" cy="320" r="3"/>
    <circle cx="400" cy="320" r="3"/>
    <circle cx="600" cy="320" r="3"/>
    <circle cx="800" cy="320" r="3"/>
    <circle cx="1000" cy="320" r="3"/>
    <circle cx="1200" cy="320" r="3"/>
    <circle cx="1400" cy="320" r="3"/>

    <circle cx="200" cy="480" r="3"/>
    <circle cx="400" cy="480" r="3"/>
    <circle cx="600" cy="480" r="3"/>
    <circle cx="800" cy="480" r="3"/>
    <circle cx="1000" cy="480" r="3"/>
    <circle cx="1200" cy="480" r="3"/>
    <circle cx="1400" cy="480" r="3"/>

    <circle cx="200" cy="640" r="3"/>
    <circle cx="400" cy="640" r="3"/>
    <circle cx="600" cy="640" r="3"/>
    <circle cx="800" cy="640" r="3"/>
    <circle cx="1000" cy="640" r="3"/>
    <circle cx="1200" cy="640" r="3"/>
    <circle cx="1400" cy="640" r="3"/>

    <!-- Connector endpoint nodes (larger, accent) -->
    <circle cx="340" cy="80" r="4"/>
    <circle cx="520" cy="240" r="4"/>
    <circle cx="100" cy="420" r="4"/>
    <circle cx="740" cy="200" r="4"/>
    <circle cx="900" cy="100" r="4"/>
    <circle cx="680" cy="400" r="4"/>
    <circle cx="1100" cy="260" r="4"/>
    <circle cx="1320" cy="140" r="4"/>
    <circle cx="1500" cy="380" r="4"/>
    <circle cx="1080" cy="560" r="4"/>
    <circle cx="260" cy="560" r="4"/>
    <circle cx="700" cy="700" r="4"/>
    <circle cx="900" cy="640" r="4"/>
  </g>
</svg>
