<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="800" viewBox="0 0 1600 800" fill="none">
  <!-- Concentric circles + radial lines: lens/target reticle, centered at right-center to not crowd text -->
  <!-- Center point pushed right so it sits in the empty right half of the hero -->
  <g stroke="#B8B4A8" fill="none" opacity="0.26">
    <!-- Concentric circles, centered at (1100, 400) -->
    <circle cx="1100" cy="400" r="80" stroke-width="1"/>
    <circle cx="1100" cy="400" r="160" stroke-width="1"/>
    <circle cx="1100" cy="400" r="240" stroke-width="1"/>
    <circle cx="1100" cy="400" r="320" stroke-width="1"/>
    <circle cx="1100" cy="400" r="400" stroke-width="1"/>
    <circle cx="1100" cy="400" r="480" stroke-width="1"/>
    <circle cx="1100" cy="400" r="560" stroke-width="1"/>
    <circle cx="1100" cy="400" r="640" stroke-width="0.5" stroke-dasharray="4 8"/>
    <circle cx="1100" cy="400" r="720" stroke-width="0.5" stroke-dasharray="4 8"/>

    <!-- Radial tick marks at 30° intervals on the main circles -->
    <!-- 0° (right) -->
    <line x1="1180" y1="400" x2="1260" y2="400" stroke-width="0.75"/>
    <line x1="1340" y1="400" x2="1420" y2="400" stroke-width="0.75"/>

    <!-- 30° -->
    <line x1="1169" y1="440" x2="1238" y2="479" stroke-width="0.75"/>
    <line x1="1307" y1="519" x2="1376" y2="558" stroke-width="0.75"/>

    <!-- 60° -->
    <line x1="1140" y1="469" x2="1180" y2="538" stroke-width="0.75"/>
    <line x1="1260" y1="608" x2="1300" y2="677" stroke-width="0.75"/>

    <!-- 90° (bottom) -->
    <line x1="1100" y1="480" x2="1100" y2="560" stroke-width="0.75"/>
    <line x1="1100" y1="640" x2="1100" y2="720" stroke-width="0.75"/>

    <!-- 120° -->
    <line x1="1060" y1="469" x2="1020" y2="538" stroke-width="0.75"/>
    <line x1="940" y1="608" x2="900" y2="677" stroke-width="0.75"/>

    <!-- 150° -->
    <line x1="1031" y1="440" x2="962" y2="479" stroke-width="0.75"/>
    <line x1="893" y1="519" x2="824" y2="558" stroke-width="0.75"/>

    <!-- 180° (left) -->
    <line x1="1020" y1="400" x2="940" y2="400" stroke-width="0.75"/>
    <line x1="860" y1="400" x2="780" y2="400" stroke-width="0.75"/>

    <!-- 210° -->
    <line x1="1031" y1="360" x2="962" y2="321" stroke-width="0.75"/>
    <line x1="893" y1="281" x2="824" y2="242" stroke-width="0.75"/>

    <!-- 240° -->
    <line x1="1060" y1="331" x2="1020" y2="262" stroke-width="0.75"/>
    <line x1="940" y1="192" x2="900" y2="123" stroke-width="0.75"/>

    <!-- 270° (top) -->
    <line x1="1100" y1="320" x2="1100" y2="240" stroke-width="0.75"/>
    <line x1="1100" y1="160" x2="1100" y2="80" stroke-width="0.75"/>

    <!-- 300° -->
    <line x1="1140" y1="331" x2="1180" y2="262" stroke-width="0.75"/>
    <line x1="1260" y1="192" x2="1300" y2="123" stroke-width="0.75"/>

    <!-- 330° -->
    <line x1="1169" y1="360" x2="1238" y2="321" stroke-width="0.75"/>
    <line x1="1307" y1="281" x2="1376" y2="242" stroke-width="0.75"/>

    <!-- Crosshair on centre circle -->
    <line x1="1054" y1="400" x2="1146" y2="400" stroke-width="1.5"/>
    <line x1="1100" y1="346" x2="1100" y2="454" stroke-width="1.5"/>

    <!-- Centre dot -->
    <circle cx="1100" cy="400" r="4" fill="#B8B4A8" stroke="none" opacity="0.5"/>
    <circle cx="1100" cy="400" r="8" stroke-width="1"/>
  </g>
</svg>
