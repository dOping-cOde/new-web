<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" width="1600" height="1000">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0B0D"/>
      <stop offset="100%" stop-color="#0E0F14"/>
    </linearGradient>
    <linearGradient id="cube-face-top" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2A2B30" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#1F2024" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="cube-face-left" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1A1B1E" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#1F2024" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="cube-face-right" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#14151A" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#1A1B1E" stop-opacity="0.3"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <filter id="glow-sm">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <rect width="1600" height="1000" fill="url(#bg)"/>

  <!-- Background grid -->
  <g stroke="#1A1B1E" stroke-width="0.5" fill="none">
    <line x1="0" y1="300" x2="1600" y2="300"/>
    <line x1="0" y1="600" x2="1600" y2="600"/>
    <line x1="0" y1="750" x2="1600" y2="750"/>
    <line x1="400" y1="0" x2="400" y2="1000"/>
    <line x1="800" y1="0" x2="800" y2="1000"/>
    <line x1="1200" y1="0" x2="1200" y2="1000"/>
  </g>

  <!-- === LEGACY CUBE (left side, greyed out) === -->
  <!-- Main 3D cube wireframe - isometric style -->
  <!-- Cube size: 220px, center: 320, 420 -->
  <!-- Top face -->
  <polygon points="320,200 500,300 500,300 320,400" fill="none"/>
  <!-- Actual top: 4 points -->
  <polygon points="200,280 320,200 440,280 320,360" fill="url(#cube-face-top)" stroke="#2A2B30" stroke-width="1.5"/>
  <!-- Left face -->
  <polygon points="200,280 320,360 320,520 200,440" fill="url(#cube-face-left)" stroke="#2A2B30" stroke-width="1.5"/>
  <!-- Right face -->
  <polygon points="320,360 440,280 440,440 320,520" fill="url(#cube-face-right)" stroke="#2A2B30" stroke-width="1.5"/>

  <!-- Internal grid lines on cube faces -->
  <!-- Top face grid -->
  <g stroke="#1F2024" stroke-width="0.8" opacity="0.6">
    <!-- Top face horizontal slices -->
    <line x1="240" y1="307" x2="360" y2="387"/>
    <line x1="280" y1="280" x2="400" y2="360"/>
    <!-- Top face vertical slices -->
    <line x1="280" y1="253" x2="280" y2="333"/>
    <line x1="350" y1="240" x2="350" y2="320"/>
    <line x1="406" y1="265" x2="334" y2="341"/>
    <!-- Left face grid -->
    <line x1="200" y1="347" x2="320" y2="427"/>
    <line x1="200" y1="413" x2="320" y2="493"/>
    <line x1="253" y1="360" x2="253" y2="520"/>
    <line x1="293" y1="336" x2="293" y2="496"/>
    <!-- Right face grid -->
    <line x1="320" y1="387" x2="440" y2="307"/>
    <line x1="320" y1="453" x2="440" y2="373"/>
    <line x1="347" y1="360" x2="347" y2="520"/>
    <line x1="400" y1="336" x2="400" y2="440"/>
  </g>

  <!-- Dimension labels on legacy cube -->
  <text x="320" y="192" font-family="monospace" font-size="9" fill="#3A3B42" text-anchor="middle">TIME</text>
  <text x="168" y="368" font-family="monospace" font-size="9" fill="#3A3B42" text-anchor="end">GEO</text>
  <text x="475" y="368" font-family="monospace" font-size="9" fill="#3A3B42">PRODUCT</text>

  <!-- Legacy label -->
  <rect x="200" y="555" width="240" height="36" rx="2" fill="#1A1B1E" stroke="#2A2B30" stroke-width="1"/>
  <text x="320" y="568" font-family="monospace" font-size="8" fill="#555860" text-anchor="middle">LEGACY OLAP CUBE</text>
  <text x="320" y="582" font-family="monospace" font-size="8" fill="#3A3B42" text-anchor="middle">MDX · SSAS · Cognos</text>

  <!-- Degraded indicators -->
  <text x="213" y="480" font-family="monospace" font-size="7" fill="#FF6B35">⚠ STALE</text>
  <text x="345" y="510" font-family="monospace" font-size="7" fill="#FF6B35">⚠ SLOW</text>

  <!-- === TRANSFORMATION ARROW === -->
  <g>
    <!-- Arrow shaft -->
    <line x1="500" y1="400" x2="700" y2="400" stroke="#3D2BFF" stroke-width="2" opacity="0.7"/>
    <!-- Arrow head -->
    <polygon points="700,390 720,400 700,410" fill="#3D2BFF" opacity="0.7"/>
    <!-- Label -->
    <rect x="550" y="378" width="120" height="18" rx="2" fill="#0F1018"/>
    <text x="610" y="391" font-family="monospace" font-size="8" fill="#3D2BFF" text-anchor="middle">MODERNIZE →</text>
    <!-- Steps below arrow -->
    <text x="530" y="420" font-family="monospace" font-size="7" fill="#555860">1. Extract MDX logic</text>
    <text x="530" y="433" font-family="monospace" font-size="7" fill="#555860">2. Translate to SQL</text>
    <text x="530" y="446" font-family="monospace" font-size="7" fill="#555860">3. Deploy semantic layer</text>
    <text x="530" y="459" font-family="monospace" font-size="7" fill="#555860">4. Validate parity</text>
    <text x="530" y="472" font-family="monospace" font-size="7" fill="#4ADE80">✓ Zero downtime</text>
  </g>

  <!-- === MODERN CUBE (right side, indigo-lit) === -->
  <!-- Modern cube - center 1020, 380 -->
  <!-- Top face -->
  <polygon points="900,260 1020,180 1140,260 1020,340" fill="#3D2BFF" opacity="0.08" stroke="#3D2BFF" stroke-width="2" stroke-opacity="0.6"/>
  <!-- Left face -->
  <polygon points="900,260 1020,340 1020,500 900,420" fill="#3D2BFF" opacity="0.05" stroke="#3D2BFF" stroke-width="2" stroke-opacity="0.4"/>
  <!-- Right face -->
  <polygon points="1020,340 1140,260 1140,420 1020,500" fill="#3D2BFF" opacity="0.04" stroke="#3D2BFF" stroke-width="1.5" stroke-opacity="0.4"/>

  <!-- Glow effect on modern cube -->
  <polygon points="900,260 1020,180 1140,260 1020,340" fill="#3D2BFF" opacity="0.05" filter="url(#glow)"/>

  <!-- Internal slices (visible layers) on modern cube -->
  <!-- Horizontal slices through cube - show internal structure -->
  <g stroke="#3D2BFF" stroke-width="1" opacity="0.4">
    <!-- Top face grid -->
    <line x1="940" y1="287" x2="1060" y2="367"/>
    <line x1="980" y1="260" x2="1100" y2="340"/>
    <line x1="980" y1="233" x2="980" y2="313"/>
    <line x1="1050" y1="220" x2="1050" y2="300"/>
    <!-- Left face grid -->
    <line x1="900" y1="327" x2="1020" y2="407"/>
    <line x1="900" y1="393" x2="1020" y2="473"/>
    <line x1="953" y1="340" x2="953" y2="500"/>
    <line x1="987" y1="316" x2="987" y2="476"/>
    <!-- Right face grid -->
    <line x1="1020" y1="367" x2="1140" y2="287"/>
    <line x1="1020" y1="433" x2="1140" y2="353"/>
    <line x1="1050" y1="340" x2="1050" y2="500"/>
    <line x1="1098" y1="316" x2="1098" y2="420"/>
  </g>

  <!-- Highlighted slice (active query slice) -->
  <polygon points="900,393 1020,473 1140,353 1020,273" fill="#3D2BFF" opacity="0.08" stroke="#3D2BFF" stroke-width="1.5" stroke-opacity="0.7" stroke-dasharray="4 3"/>

  <!-- Data nodes at cube vertices -->
  <circle cx="900" cy="260" r="5" fill="#3D2BFF" opacity="0.8"/>
  <circle cx="1020" cy="180" r="5" fill="#3D2BFF" opacity="0.9"/>
  <circle cx="1140" cy="260" r="5" fill="#3D2BFF" opacity="0.8"/>
  <circle cx="1020" cy="340" r="5" fill="#3D2BFF" opacity="0.7"/>
  <circle cx="900" cy="420" r="4" fill="#3D2BFF" opacity="0.5"/>
  <circle cx="1140" cy="420" r="4" fill="#3D2BFF" opacity="0.5"/>
  <circle cx="1020" cy="500" r="4" fill="#3D2BFF" opacity="0.4"/>

  <!-- Dimension labels on modern cube -->
  <text x="1020" y="172" font-family="monospace" font-size="9" fill="#3D2BFF" text-anchor="middle">TIME</text>
  <text x="868" y="348" font-family="monospace" font-size="9" fill="#3D2BFF" text-anchor="end">GEO</text>
  <text x="1155" y="348" font-family="monospace" font-size="9" fill="#3D2BFF">PRODUCT</text>

  <!-- Modern label -->
  <rect x="900" y="535" width="240" height="36" rx="2" fill="#1A1B1E" stroke="#3D2BFF" stroke-width="1" opacity="0.6"/>
  <text x="1020" y="548" font-family="monospace" font-size="8" fill="#3D2BFF" text-anchor="middle">MODERN SEMANTIC LAYER</text>
  <text x="1020" y="562" font-family="monospace" font-size="8" fill="#555860" text-anchor="middle">dbt · BigQuery · Looker</text>

  <!-- Good indicators -->
  <text x="913" y="480" font-family="monospace" font-size="7" fill="#4ADE80">✓ LIVE</text>
  <text x="1044" y="512" font-family="monospace" font-size="7" fill="#4ADE80">✓ FAST</text>

  <!-- Stats panel - bottom right -->
  <rect x="1260" y="580" width="300" height="300" rx="4" fill="#0F1018" stroke="#1F2024" stroke-width="1"/>
  <rect x="1260" y="580" width="300" height="26" rx="4" fill="#1A1B1E"/>
  <text x="1274" y="598" font-family="monospace" font-size="9" fill="#8A8C92" letter-spacing="1">MODERNISATION METRICS</text>
  <text x="1274" y="626" font-family="monospace" font-size="9" fill="#555860">CUBES MIGRATED</text>
  <text x="1550" y="626" font-family="monospace" font-size="9" fill="#E8E9EB" text-anchor="end">47 / 47</text>
  <rect x="1274" y="632" width="266" height="1" fill="#1F2024"/>
  <text x="1274" y="650" font-family="monospace" font-size="9" fill="#555860">MDX QUERIES REPLACED</text>
  <text x="1550" y="650" font-family="monospace" font-size="9" fill="#E8E9EB" text-anchor="end">2,340</text>
  <rect x="1274" y="656" width="266" height="1" fill="#1F2024"/>
  <text x="1274" y="674" font-family="monospace" font-size="9" fill="#555860">PARITY TEST PASS RATE</text>
  <text x="1550" y="674" font-family="monospace" font-size="9" fill="#4ADE80" text-anchor="end">100%</text>
  <rect x="1274" y="680" width="266" height="1" fill="#1F2024"/>
  <text x="1274" y="698" font-family="monospace" font-size="9" fill="#555860">QUERY SPEEDUP</text>
  <text x="1550" y="698" font-family="monospace" font-size="9" fill="#3D2BFF" text-anchor="end">18× avg</text>
  <rect x="1274" y="704" width="266" height="1" fill="#1F2024"/>
  <text x="1274" y="722" font-family="monospace" font-size="9" fill="#555860">INFRA COST DELTA</text>
  <text x="1550" y="722" font-family="monospace" font-size="9" fill="#4ADE80" text-anchor="end">-67%</text>
  <rect x="1274" y="728" width="266" height="1" fill="#1F2024"/>
  <text x="1274" y="746" font-family="monospace" font-size="9" fill="#555860">DOWNTIME</text>
  <text x="1550" y="746" font-family="monospace" font-size="9" fill="#4ADE80" text-anchor="end">ZERO</text>
  <rect x="1274" y="752" width="266" height="1" fill="#1F2024"/>
  <text x="1274" y="770" font-family="monospace" font-size="9" fill="#555860">LEGACY LICENCES</text>
  <text x="1550" y="770" font-family="monospace" font-size="9" fill="#4ADE80" text-anchor="end">RETIRED</text>
  <rect x="1274" y="776" width="266" height="1" fill="#1F2024"/>
  <text x="1274" y="794" font-family="monospace" font-size="9" fill="#555860">PROJECT DURATION</text>
  <text x="1550" y="794" font-family="monospace" font-size="9" fill="#E8E9EB" text-anchor="end">6 months</text>
  <text x="1274" y="840" font-family="monospace" font-size="8" fill="#3D2BFF">STATUS: COMPLETE</text>
  <text x="1274" y="856" font-family="monospace" font-size="8" fill="#555860">All legacy systems decommissioned</text>

  <!-- Label -->
  <text x="60" y="870" font-family="monospace" font-size="16" fill="#1F2024" letter-spacing="4">MULTIDIMENSIONAL OLAP MODERNIZATION</text>
  <text x="60" y="892" font-family="monospace" font-size="11" fill="#2A2B30" letter-spacing="2">MDX → SQL SEMANTIC LAYER MIGRATION · ZERO DOWNTIME</text>

  <text x="1580" y="990" font-family="monospace" font-size="8" fill="#2A2B30" text-anchor="end">TODO: Replace with real photography</text>
</svg>
