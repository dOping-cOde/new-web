<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" width="1600" height="1000">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0B0D"/>
      <stop offset="100%" stop-color="#0E0F14"/>
    </linearGradient>
    <linearGradient id="plane1-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFD400" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#FFD400" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="plane2-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFD400" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#FFD400" stop-opacity="0.03"/>
    </linearGradient>
    <linearGradient id="plane3-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFD400" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#FFD400" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="data-flow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFD400" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#FFD400" stop-opacity="0.1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>

  <rect width="1600" height="1000" fill="url(#bg)"/>

  <!-- Background grid -->
  <g stroke="#1A1B1E" stroke-width="0.5" fill="none">
    <line x1="0" y1="300" x2="1600" y2="300"/>
    <line x1="0" y1="500" x2="1600" y2="500"/>
    <line x1="0" y1="700" x2="1600" y2="700"/>
    <line x1="200" y1="0" x2="200" y2="1000"/>
    <line x1="500" y1="0" x2="500" y2="1000"/>
    <line x1="800" y1="0" x2="800" y2="1000"/>
    <line x1="1100" y1="0" x2="1100" y2="1000"/>
    <line x1="1400" y1="0" x2="1400" y2="1000"/>
  </g>

  <!-- DATA MESH - 4 horizontal planes with 3D perspective -->

  <!-- PLANE 1 - Top (Presentation/Consumption Layer) -->
  <!-- Plane fill -->
  <polygon points="140,160 1460,160 1420,220 180,220" fill="url(#plane1-grad)" stroke="#FFD400" stroke-width="1.5" stroke-opacity="0.5"/>
  <!-- Plane grid lines -->
  <g stroke="#FFD400" stroke-width="0.5" opacity="0.3">
    <line x1="380" y1="160" x2="360" y2="220"/>
    <line x1="620" y1="160" x2="600" y2="220"/>
    <line x1="860" y1="160" x2="840" y2="220"/>
    <line x1="1100" y1="160" x2="1080" y2="220"/>
    <line x1="1340" y1="160" x2="1320" y2="220"/>
    <line x1="140" y1="180" x2="1460" y2="180"/>
    <line x1="145" y1="200" x2="1455" y2="200"/>
  </g>
  <text x="162" y="195" font-family="monospace" font-size="10" fill="#FFD400" opacity="0.8">CONSUMPTION LAYER</text>
  <!-- Schema nodes on plane 1 -->
  <rect x="340" y="164" width="60" height="16" rx="2" fill="#FFD400" opacity="0.3"/>
  <text x="345" y="175" font-family="monospace" font-size="7" fill="#E8E9EB">dashboards</text>
  <rect x="580" y="164" width="50" height="16" rx="2" fill="#FFD400" opacity="0.3"/>
  <text x="585" y="175" font-family="monospace" font-size="7" fill="#E8E9EB">reports</text>
  <rect x="820" y="164" width="44" height="16" rx="2" fill="#FFD400" opacity="0.3"/>
  <text x="825" y="175" font-family="monospace" font-size="7" fill="#E8E9EB">ML models</text>
  <rect x="1060" y="164" width="48" height="16" rx="2" fill="#FFD400" opacity="0.3"/>
  <text x="1065" y="175" font-family="monospace" font-size="7" fill="#E8E9EB">APIs</text>

  <!-- PLANE 2 - Semantic / Catalog Layer -->
  <polygon points="140,320 1460,320 1420,380 180,380" fill="url(#plane2-grad)" stroke="#2A2B30" stroke-width="1.5"/>
  <g stroke="#2A2B30" stroke-width="0.5" opacity="0.5">
    <line x1="380" y1="320" x2="360" y2="380"/>
    <line x1="620" y1="320" x2="600" y2="380"/>
    <line x1="860" y1="320" x2="840" y2="380"/>
    <line x1="1100" y1="320" x2="1080" y2="380"/>
    <line x1="140" y1="340" x2="1460" y2="340"/>
    <line x1="145" y1="360" x2="1455" y2="360"/>
  </g>
  <text x="162" y="356" font-family="monospace" font-size="10" fill="#8A8C92">SEMANTIC CATALOG LAYER</text>
  <!-- Schema nodes -->
  <rect x="300" y="328" width="80" height="14" rx="2" fill="#1F2024" stroke="#2A2B30" stroke-width="1"/>
  <text x="305" y="338" font-family="monospace" font-size="7" fill="#8A8C92">entity: Customer</text>
  <rect x="540" y="328" width="80" height="14" rx="2" fill="#1F2024" stroke="#2A2B30" stroke-width="1"/>
  <text x="545" y="338" font-family="monospace" font-size="7" fill="#8A8C92">entity: Product</text>
  <rect x="780" y="328" width="80" height="14" rx="2" fill="#1F2024" stroke="#2A2B30" stroke-width="1"/>
  <text x="785" y="338" font-family="monospace" font-size="7" fill="#8A8C92">entity: Order</text>
  <rect x="1020" y="328" width="80" height="14" rx="2" fill="#1F2024" stroke="#2A2B30" stroke-width="1"/>
  <text x="1025" y="338" font-family="monospace" font-size="7" fill="#8A8C92">entity: Event</text>
  <rect x="1260" y="328" width="100" height="14" rx="2" fill="#1F2024" stroke="#2A2B30" stroke-width="1"/>
  <text x="1265" y="338" font-family="monospace" font-size="7" fill="#8A8C92">entity: Transaction</text>

  <!-- PLANE 3 - Domain / Integration Layer -->
  <polygon points="140,480 1460,480 1420,540 180,540" fill="url(#plane3-grad)" stroke="#2A2B30" stroke-width="1.2"/>
  <g stroke="#2A2B30" stroke-width="0.5" opacity="0.4">
    <line x1="380" y1="480" x2="360" y2="540"/>
    <line x1="620" y1="480" x2="600" y2="540"/>
    <line x1="860" y1="480" x2="840" y2="540"/>
    <line x1="1100" y1="480" x2="1080" y2="540"/>
    <line x1="140" y1="500" x2="1460" y2="500"/>
    <line x1="145" y1="520" x2="1455" y2="520"/>
  </g>
  <text x="162" y="516" font-family="monospace" font-size="10" fill="#555860">DOMAIN DATA LAYER</text>
  <rect x="280" y="488" width="90" height="14" rx="2" fill="#1A1B1E" stroke="#1F2024" stroke-width="1"/>
  <text x="285" y="498" font-family="monospace" font-size="7" fill="#555860">sales_domain</text>
  <rect x="540" y="488" width="90" height="14" rx="2" fill="#1A1B1E" stroke="#1F2024" stroke-width="1"/>
  <text x="545" y="498" font-family="monospace" font-size="7" fill="#555860">product_domain</text>
  <rect x="800" y="488" width="90" height="14" rx="2" fill="#1A1B1E" stroke="#1F2024" stroke-width="1"/>
  <text x="805" y="498" font-family="monospace" font-size="7" fill="#555860">ops_domain</text>
  <rect x="1060" y="488" width="90" height="14" rx="2" fill="#1A1B1E" stroke="#1F2024" stroke-width="1"/>
  <text x="1065" y="498" font-family="monospace" font-size="7" fill="#555860">finance_domain</text>
  <rect x="1320" y="488" width="80" height="14" rx="2" fill="#1A1B1E" stroke="#1F2024" stroke-width="1"/>
  <text x="1325" y="498" font-family="monospace" font-size="7" fill="#555860">hr_domain</text>

  <!-- PLANE 4 - Source / Ingestion Layer -->
  <polygon points="140,640 1460,640 1420,700 180,700" fill="#0F1018" stroke="#1F2024" stroke-width="1"/>
  <g stroke="#1F2024" stroke-width="0.5" opacity="0.4">
    <line x1="380" y1="640" x2="360" y2="700"/>
    <line x1="620" y1="640" x2="600" y2="700"/>
    <line x1="860" y1="640" x2="840" y2="700"/>
    <line x1="1100" y1="640" x2="1080" y2="700"/>
    <line x1="140" y1="660" x2="1460" y2="660"/>
    <line x1="145" y1="680" x2="1455" y2="680"/>
  </g>
  <text x="162" y="676" font-family="monospace" font-size="10" fill="#2A2B30">SOURCE SYSTEMS</text>
  <rect x="240" y="648" width="60" height="14" rx="2" fill="#0F1018" stroke="#1F2024" stroke-width="1"/>
  <text x="245" y="658" font-family="monospace" font-size="7" fill="#2A2B30">Salesforce</text>
  <rect x="460" y="648" width="60" height="14" rx="2" fill="#0F1018" stroke="#1F2024" stroke-width="1"/>
  <text x="465" y="658" font-family="monospace" font-size="7" fill="#2A2B30">SAP ERP</text>
  <rect x="680" y="648" width="60" height="14" rx="2" fill="#0F1018" stroke="#1F2024" stroke-width="1"/>
  <text x="685" y="658" font-family="monospace" font-size="7" fill="#2A2B30">PostgreSQL</text>
  <rect x="900" y="648" width="60" height="14" rx="2" fill="#0F1018" stroke="#1F2024" stroke-width="1"/>
  <text x="905" y="658" font-family="monospace" font-size="7" fill="#2A2B30">Kafka</text>
  <rect x="1120" y="648" width="60" height="14" rx="2" fill="#0F1018" stroke="#1F2024" stroke-width="1"/>
  <text x="1125" y="658" font-family="monospace" font-size="7" fill="#2A2B30">MongoDB</text>
  <rect x="1340" y="648" width="60" height="14" rx="2" fill="#0F1018" stroke="#1F2024" stroke-width="1"/>
  <text x="1345" y="658" font-family="monospace" font-size="7" fill="#2A2B30">S3 / GCS</text>

  <!-- Vertical connection lines between layers -->
  <!-- Layer 1 to Layer 2 -->
  <g stroke="url(#data-flow)" stroke-width="1" opacity="0.6">
    <line x1="370" y1="220" x2="360" y2="320"/>
    <line x1="610" y1="220" x2="600" y2="320"/>
    <line x1="850" y1="220" x2="840" y2="320"/>
    <line x1="1090" y1="220" x2="1080" y2="320"/>
  </g>
  <!-- Layer 2 to Layer 3 -->
  <g stroke="#2A2B30" stroke-width="1" opacity="0.5">
    <line x1="360" y1="380" x2="350" y2="480"/>
    <line x1="600" y1="380" x2="590" y2="480"/>
    <line x1="840" y1="380" x2="830" y2="480"/>
    <line x1="1080" y1="380" x2="1070" y2="480"/>
    <line x1="1320" y1="380" x2="1310" y2="480"/>
  </g>
  <!-- Layer 3 to Layer 4 -->
  <g stroke="#1F2024" stroke-width="1" opacity="0.5">
    <line x1="350" y1="540" x2="340" y2="640"/>
    <line x1="590" y1="540" x2="580" y2="640"/>
    <line x1="830" y1="540" x2="820" y2="640"/>
    <line x1="1070" y1="540" x2="1060" y2="640"/>
    <line x1="1310" y1="540" x2="1300" y2="640"/>
  </g>

  <!-- Active data flow particle (glowing dot on data-flow line) -->
  <circle cx="360" cy="270" r="3" fill="#FFD400" opacity="0.9" filter="url(#glow)"/>
  <circle cx="600" cy="350" r="3" fill="#FFD400" opacity="0.7" filter="url(#glow)"/>
  <circle cx="840" cy="430" r="3" fill="#FFD400" opacity="0.5" filter="url(#glow)"/>

  <!-- Layer labels (left side) -->
  <text x="100" y="194" font-family="monospace" font-size="8" fill="#FFD400" text-anchor="middle">L4</text>
  <text x="100" y="354" font-family="monospace" font-size="8" fill="#8A8C92" text-anchor="middle">L3</text>
  <text x="100" y="514" font-family="monospace" font-size="8" fill="#555860" text-anchor="middle">L2</text>
  <text x="100" y="674" font-family="monospace" font-size="8" fill="#2A2B30" text-anchor="middle">L1</text>

  <!-- Right panel -->
  <rect x="1380" y="740" width="180" height="180" rx="4" fill="#0F1018" stroke="#1F2024" stroke-width="1"/>
  <rect x="1380" y="740" width="180" height="24" rx="4" fill="#1A1B1E"/>
  <text x="1394" y="756" font-family="monospace" font-size="8" fill="#8A8C92" letter-spacing="1">MESH STATS</text>
  <text x="1394" y="778" font-family="monospace" font-size="8" fill="#555860">DOMAINS</text>
  <text x="1550" y="778" font-family="monospace" font-size="8" fill="#E8E9EB" text-anchor="end">14</text>
  <text x="1394" y="794" font-family="monospace" font-size="8" fill="#555860">ENTITIES</text>
  <text x="1550" y="794" font-family="monospace" font-size="8" fill="#E8E9EB" text-anchor="end">847</text>
  <text x="1394" y="810" font-family="monospace" font-size="8" fill="#555860">SOURCES</text>
  <text x="1550" y="810" font-family="monospace" font-size="8" fill="#E8E9EB" text-anchor="end">23</text>
  <text x="1394" y="826" font-family="monospace" font-size="8" fill="#555860">LATENCY</text>
  <text x="1550" y="826" font-family="monospace" font-size="8" fill="#FFD400" text-anchor="end">&lt;200ms</text>
  <text x="1394" y="842" font-family="monospace" font-size="8" fill="#555860">FRESHNESS</text>
  <text x="1550" y="842" font-family="monospace" font-size="8" fill="#4ADE80" text-anchor="end">REAL-TIME</text>
  <text x="1394" y="858" font-family="monospace" font-size="8" fill="#555860">COVERAGE</text>
  <text x="1550" y="858" font-family="monospace" font-size="8" fill="#E8E9EB" text-anchor="end">96%</text>
  <text x="1394" y="874" font-family="monospace" font-size="8" fill="#555860">QUALITY</text>
  <text x="1550" y="874" font-family="monospace" font-size="8" fill="#4ADE80" text-anchor="end">99.1%</text>
  <text x="1394" y="890" font-family="monospace" font-size="8" fill="#555860">LINEAGE</text>
  <text x="1550" y="890" font-family="monospace" font-size="8" fill="#E8E9EB" text-anchor="end">TRACKED</text>
  <text x="1394" y="906" font-family="monospace" font-size="8" fill="#FFD400">STATUS: HEALTHY</text>

  <!-- Label -->
  <text x="60" y="870" font-family="monospace" font-size="22" fill="#1F2024" letter-spacing="4">UNIFIED SEMANTIC FABRIC</text>
  <text x="60" y="892" font-family="monospace" font-size="11" fill="#2A2B30" letter-spacing="2">ENTERPRISE DATA MESH · SEMANTIC LAYER ARCHITECTURE</text>

  <text x="1580" y="990" font-family="monospace" font-size="8" fill="#2A2B30" text-anchor="end">TODO: Replace with real photography</text>
</svg>
