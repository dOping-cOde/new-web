<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" width="1600" height="1000">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0B0D"/>
      <stop offset="100%" stop-color="#0D0E13"/>
    </linearGradient>
    <linearGradient id="terrain-shade" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1A1B1E" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#0A0B0D" stop-opacity="0.2"/>
    </linearGradient>
    <filter id="zone-glow">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <filter id="drone-glow">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
  </defs>

  <rect width="1600" height="1000" fill="url(#bg)"/>

  <!-- Top-down terrain grid (mining site) -->
  <!-- Grid lines -->
  <g stroke="#1A1B1E" stroke-width="0.8" fill="none">
    <!-- Horizontal grid -->
    <line x1="80" y1="140" x2="1320" y2="140"/>
    <line x1="80" y1="200" x2="1320" y2="200"/>
    <line x1="80" y1="260" x2="1320" y2="260"/>
    <line x1="80" y1="320" x2="1320" y2="320"/>
    <line x1="80" y1="380" x2="1320" y2="380"/>
    <line x1="80" y1="440" x2="1320" y2="440"/>
    <line x1="80" y1="500" x2="1320" y2="500"/>
    <line x1="80" y1="560" x2="1320" y2="560"/>
    <line x1="80" y1="620" x2="1320" y2="620"/>
    <line x1="80" y1="680" x2="1320" y2="680"/>
    <line x1="80" y1="740" x2="1320" y2="740"/>
    <line x1="80" y1="800" x2="1320" y2="800"/>
    <!-- Vertical grid -->
    <line x1="80" y1="140" x2="80" y2="800"/>
    <line x1="140" y1="140" x2="140" y2="800"/>
    <line x1="200" y1="140" x2="200" y2="800"/>
    <line x1="260" y1="140" x2="260" y2="800"/>
    <line x1="320" y1="140" x2="320" y2="800"/>
    <line x1="380" y1="140" x2="380" y2="800"/>
    <line x1="440" y1="140" x2="440" y2="800"/>
    <line x1="500" y1="140" x2="500" y2="800"/>
    <line x1="560" y1="140" x2="560" y2="800"/>
    <line x1="620" y1="140" x2="620" y2="800"/>
    <line x1="680" y1="140" x2="680" y2="800"/>
    <line x1="740" y1="140" x2="740" y2="800"/>
    <line x1="800" y1="140" x2="800" y2="800"/>
    <line x1="860" y1="140" x2="860" y2="800"/>
    <line x1="920" y1="140" x2="920" y2="800"/>
    <line x1="980" y1="140" x2="980" y2="800"/>
    <line x1="1040" y1="140" x2="1040" y2="800"/>
    <line x1="1100" y1="140" x2="1100" y2="800"/>
    <line x1="1160" y1="140" x2="1160" y2="800"/>
    <line x1="1220" y1="140" x2="1220" y2="800"/>
    <line x1="1280" y1="140" x2="1280" y2="800"/>
    <line x1="1320" y1="140" x2="1320" y2="800"/>
  </g>

  <!-- Coordinate labels -->
  <text x="80" y="130" font-family="monospace" font-size="8" fill="#2A2B30">0</text>
  <text x="440" y="130" font-family="monospace" font-size="8" fill="#2A2B30">600m</text>
  <text x="800" y="130" font-family="monospace" font-size="8" fill="#2A2B30">1200m</text>
  <text x="1160" y="130" font-family="monospace" font-size="8" fill="#2A2B30">1800m</text>

  <!-- Terrain elevation patches (abstract topography) -->
  <ellipse cx="350" cy="470" rx="100" ry="70" fill="#1A1B1E" opacity="0.6"/>
  <ellipse cx="350" cy="470" rx="70" ry="48" fill="#1E1F24" opacity="0.5"/>
  <ellipse cx="750" cy="350" rx="140" ry="90" fill="#1A1B1E" opacity="0.5"/>
  <ellipse cx="750" cy="350" rx="90" ry="58" fill="#1E1F24" opacity="0.4"/>
  <ellipse cx="650" cy="620" rx="80" ry="55" fill="#1A1B1E" opacity="0.5"/>
  <ellipse cx="1050" cy="500" rx="110" ry="75" fill="#1A1B1E" opacity="0.4"/>

  <!-- Detection zones (highlighted anomalies) -->
  <!-- Zone A - indigo -->
  <circle cx="480" cy="380" r="50" fill="#3D2BFF" opacity="0.08" filter="url(#zone-glow)"/>
  <circle cx="480" cy="380" r="44" fill="none" stroke="#3D2BFF" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.7"/>
  <circle cx="480" cy="380" r="6" fill="#3D2BFF" opacity="0.8"/>
  <text x="532" y="374" font-family="monospace" font-size="9" fill="#3D2BFF">ANOMALY-A</text>
  <text x="532" y="386" font-family="monospace" font-size="8" fill="#555860">CONF: 94.1%</text>

  <!-- Zone B - warning -->
  <circle cx="920" cy="580" r="40" fill="#FACC15" opacity="0.05" filter="url(#zone-glow)"/>
  <circle cx="920" cy="580" r="36" fill="none" stroke="#FACC15" stroke-width="1" stroke-dasharray="4 4" opacity="0.5"/>
  <circle cx="920" cy="580" r="5" fill="#FACC15" opacity="0.7"/>
  <text x="964" y="574" font-family="monospace" font-size="9" fill="#FACC15">ANOMALY-B</text>
  <text x="964" y="586" font-family="monospace" font-size="8" fill="#555860">CONF: 78.3%</text>

  <!-- Zone C - active -->
  <circle cx="280" cy="660" r="35" fill="#3D2BFF" opacity="0.06" filter="url(#zone-glow)"/>
  <circle cx="280" cy="660" r="30" fill="none" stroke="#3D2BFF" stroke-width="1" stroke-dasharray="3 5" opacity="0.5"/>
  <circle cx="280" cy="660" r="4" fill="#3D2BFF" opacity="0.6"/>
  <text x="318" y="654" font-family="monospace" font-size="8" fill="#3D2BFF">ANOMALY-C</text>
  <text x="318" y="666" font-family="monospace" font-size="8" fill="#555860">CONF: 88.7%</text>

  <!-- Flight path (dotted line) -->
  <polyline points="180,760 220,660 280,560 380,480 480,380 580,310 680,280 780,290 880,330 960,400 1020,480 1060,560 1080,640 1060,720"
    fill="none" stroke="#3D2BFF" stroke-width="1.5" stroke-dasharray="6 4" opacity="0.7"/>

  <!-- Waypoints on path -->
  <circle cx="180" cy="760" r="5" fill="#3D2BFF" opacity="0.5"/>
  <text x="188" y="775" font-family="monospace" font-size="8" fill="#555860">WP01</text>
  <circle cx="480" cy="380" r="0"/><!-- already shown as anomaly -->
  <circle cx="780" cy="290" r="5" fill="#2A2B30"/>
  <text x="788" y="284" font-family="monospace" font-size="8" fill="#555860">WP06</text>
  <circle cx="1060" cy="720" r="5" fill="#4ADE80" opacity="0.8"/>
  <text x="1068" y="715" font-family="monospace" font-size="8" fill="#4ADE80">RTB</text>

  <!-- Drone icon (top-down) at current position -->
  <g transform="translate(680, 280)">
    <circle cx="0" cy="0" r="20" fill="#3D2BFF" opacity="0.1" filter="url(#drone-glow)"/>
    <!-- Drone body -->
    <rect x="-8" y="-8" width="16" height="16" rx="2" fill="#1A1B1E" stroke="#3D2BFF" stroke-width="1.5"/>
    <!-- Arms -->
    <line x1="-8" y1="-8" x2="-20" y2="-20" stroke="#2A2B30" stroke-width="2"/>
    <line x1="8" y1="-8" x2="20" y2="-20" stroke="#2A2B30" stroke-width="2"/>
    <line x1="-8" y1="8" x2="-20" y2="20" stroke="#2A2B30" stroke-width="2"/>
    <line x1="8" y1="8" x2="20" y2="20" stroke="#2A2B30" stroke-width="2"/>
    <!-- Rotors -->
    <circle cx="-20" cy="-20" r="8" fill="none" stroke="#3D2BFF" stroke-width="1.5" opacity="0.7"/>
    <circle cx="20" cy="-20" r="8" fill="none" stroke="#3D2BFF" stroke-width="1.5" opacity="0.7"/>
    <circle cx="-20" cy="20" r="8" fill="none" stroke="#3D2BFF" stroke-width="1.5" opacity="0.7"/>
    <circle cx="20" cy="20" r="8" fill="none" stroke="#3D2BFF" stroke-width="1.5" opacity="0.7"/>
    <!-- Center dot -->
    <circle cx="0" cy="0" r="3" fill="#3D2BFF"/>
  </g>

  <!-- Right panel - telemetry -->
  <rect x="1360" y="120" width="200" height="480" rx="4" fill="#0F1018" stroke="#1F2024" stroke-width="1"/>
  <rect x="1360" y="120" width="200" height="26" rx="4" fill="#1A1B1E"/>
  <text x="1374" y="138" font-family="monospace" font-size="9" fill="#8A8C92" letter-spacing="1">FLIGHT DATA</text>
  <text x="1374" y="168" font-family="monospace" font-size="9" fill="#555860">ALTITUDE</text>
  <text x="1550" y="168" font-family="monospace" font-size="9" fill="#E8E9EB" text-anchor="end">42m AGL</text>
  <rect x="1374" y="174" width="166" height="1" fill="#1F2024"/>
  <text x="1374" y="192" font-family="monospace" font-size="9" fill="#555860">SPEED</text>
  <text x="1550" y="192" font-family="monospace" font-size="9" fill="#E8E9EB" text-anchor="end">8.4 m/s</text>
  <rect x="1374" y="198" width="166" height="1" fill="#1F2024"/>
  <text x="1374" y="216" font-family="monospace" font-size="9" fill="#555860">HEADING</text>
  <text x="1550" y="216" font-family="monospace" font-size="9" fill="#E8E9EB" text-anchor="end">047°</text>
  <rect x="1374" y="222" width="166" height="1" fill="#1F2024"/>
  <text x="1374" y="240" font-family="monospace" font-size="9" fill="#555860">BATTERY</text>
  <text x="1550" y="240" font-family="monospace" font-size="9" fill="#4ADE80" text-anchor="end">67%</text>
  <rect x="1374" y="246" width="166" height="1" fill="#1F2024"/>
  <text x="1374" y="264" font-family="monospace" font-size="9" fill="#555860">GPS SATS</text>
  <text x="1550" y="264" font-family="monospace" font-size="9" fill="#E8E9EB" text-anchor="end">14</text>
  <rect x="1374" y="270" width="166" height="1" fill="#1F2024"/>
  <text x="1374" y="288" font-family="monospace" font-size="9" fill="#555860">CAMERA</text>
  <text x="1550" y="288" font-family="monospace" font-size="9" fill="#4ADE80" text-anchor="end">4K · 30fps</text>
  <rect x="1374" y="294" width="166" height="1" fill="#1F2024"/>
  <text x="1374" y="312" font-family="monospace" font-size="9" fill="#555860">THERMAL</text>
  <text x="1550" y="312" font-family="monospace" font-size="9" fill="#4ADE80" text-anchor="end">ACTIVE</text>
  <rect x="1374" y="318" width="166" height="1" fill="#1F2024"/>

  <!-- Altitude histogram -->
  <text x="1374" y="348" font-family="monospace" font-size="8" fill="#555860">ALTITUDE PROFILE</text>
  <polyline points="1374,420 1394,410 1414,400 1434,390 1454,380 1474,370 1494,380 1514,390 1534,400 1550,410"
    fill="none" stroke="#3D2BFF" stroke-width="1.5" opacity="0.7"/>
  <line x1="1374" y1="428" x2="1550" y2="428" stroke="#1F2024" stroke-width="1"/>
  <text x="1374" y="438" font-family="monospace" font-size="7" fill="#555860">0m</text>
  <text x="1550" y="438" font-family="monospace" font-size="7" fill="#555860" text-anchor="end">100m</text>

  <!-- Detections summary -->
  <text x="1374" y="468" font-family="monospace" font-size="8" fill="#555860">DETECTIONS</text>
  <rect x="1374" y="474" width="166" height="1" fill="#1F2024"/>
  <text x="1374" y="492" font-family="monospace" font-size="8" fill="#3D2BFF">HIGH CONF: 2</text>
  <text x="1374" y="506" font-family="monospace" font-size="8" fill="#FACC15">MED CONF:  1</text>
  <text x="1374" y="520" font-family="monospace" font-size="8" fill="#555860">FALSE POS: 0</text>
  <text x="1374" y="578" font-family="monospace" font-size="8" fill="#4ADE80">MISSION: ACTIVE</text>

  <!-- Label -->
  <text x="80" y="870" font-family="monospace" font-size="22" fill="#1F2024" letter-spacing="4">AI-COPTER</text>
  <text x="80" y="892" font-family="monospace" font-size="11" fill="#2A2B30" letter-spacing="2">AUTONOMOUS DRONE INSPECTION · MINING OPERATIONS</text>

  <text x="1580" y="990" font-family="monospace" font-size="8" fill="#2A2B30" text-anchor="end">TODO: Replace with real photography</text>
</svg>
