<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" width="1600" height="1000">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0C0D12"/>
      <stop offset="100%" stop-color="#0A0B0D"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
    <filter id="glow-sm">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
    <linearGradient id="bar-a" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#3D2BFF" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#3D2BFF" stop-opacity="0.9"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="1000" fill="url(#bg)"/>

  <!-- Grid -->
  <g stroke="#1A1B1E" stroke-width="0.5" fill="none">
    <line x1="0" y1="250" x2="1600" y2="250"/>
    <line x1="0" y1="500" x2="1600" y2="500"/>
    <line x1="0" y1="750" x2="1600" y2="750"/>
    <line x1="400" y1="0" x2="400" y2="1000"/>
    <line x1="800" y1="0" x2="800" y2="1000"/>
    <line x1="1200" y1="0" x2="1200" y2="1000"/>
  </g>

  <!-- Chat interface - left panel -->
  <rect x="80" y="100" width="640" height="680" rx="8" fill="#0F1018" stroke="#1F2024" stroke-width="1"/>
  <!-- Header -->
  <rect x="80" y="100" width="640" height="40" rx="8" fill="#1A1B1E"/>
  <circle cx="106" cy="120" r="8" fill="#3D2BFF" opacity="0.6"/>
  <text x="122" y="124" font-family="monospace" font-size="10" fill="#E8E9EB">Conversational Data Agent</text>
  <circle cx="688" cy="120" r="4" fill="#4ADE80"/>

  <!-- Message 1 - User -->
  <rect x="340" y="164" width="356" height="44" rx="12" fill="#1F2024"/>
  <text x="360" y="181" font-family="monospace" font-size="9" fill="#E8E9EB">What were our top 5 revenue</text>
  <text x="360" y="197" font-family="monospace" font-size="9" fill="#E8E9EB">products last quarter?</text>
  <text x="688" y="216" font-family="monospace" font-size="7" fill="#555860" text-anchor="end">09:14</text>

  <!-- Message 2 - Agent thinking -->
  <rect x="96" y="224" width="280" height="32" rx="12" fill="#1A1B1E" stroke="#1F2024" stroke-width="1"/>
  <text x="116" y="241" font-family="monospace" font-size="9" fill="#555860">Querying revenue.products...</text>
  <circle cx="384" cy="240" r="3" fill="#3D2BFF" opacity="0.7"/>
  <circle cx="394" cy="240" r="3" fill="#3D2BFF" opacity="0.5"/>
  <circle cx="404" cy="240" r="3" fill="#3D2BFF" opacity="0.3"/>

  <!-- SQL translation display -->
  <rect x="96" y="272" width="560" height="80" rx="4" fill="#0A0B0D" stroke="#2A2B30" stroke-width="1"/>
  <text x="112" y="290" font-family="monospace" font-size="8" fill="#555860">→ Generated SQL</text>
  <text x="112" y="308" font-family="monospace" font-size="8" fill="#3D2BFF">SELECT</text>
  <text x="156" y="308" font-family="monospace" font-size="8" fill="#8A8C92">product_name, SUM(revenue) as total_rev</text>
  <text x="112" y="322" font-family="monospace" font-size="8" fill="#3D2BFF">FROM</text>
  <text x="152" y="322" font-family="monospace" font-size="8" fill="#8A8C92">fact_sales fs JOIN dim_products p ON fs.product_id = p.id</text>
  <text x="112" y="336" font-family="monospace" font-size="8" fill="#3D2BFF">WHERE</text>
  <text x="155" y="336" font-family="monospace" font-size="8" fill="#8A8C92">quarter = 'Q3-2024'</text>
  <text x="112" y="350" font-family="monospace" font-size="8" fill="#3D2BFF">ORDER BY</text>
  <text x="165" y="350" font-family="monospace" font-size="8" fill="#8A8C92">total_rev DESC LIMIT 5</text>

  <!-- Response with mini bar chart -->
  <rect x="96" y="368" width="440" height="180" rx="12" fill="#1A1B1E" stroke="#1F2024" stroke-width="1"/>
  <text x="116" y="388" font-family="monospace" font-size="9" fill="#E8E9EB">Here are the top 5 by revenue (Q3 2024):</text>
  <!-- Mini bar chart inside bubble -->
  <!-- Bars -->
  <g>
    <rect x="116" y="440" width="6" height="80" fill="#3D2BFF" opacity="0.3"/>
    <rect x="116" y="396" width="200" height="16" rx="2" fill="#3D2BFF" opacity="0.5"/>
    <text x="328" y="408" font-family="monospace" font-size="8" fill="#E8E9EB">Enterprise Suite · $4.2M</text>

    <rect x="116" y="420" width="168" height="16" rx="2" fill="#3D2BFF" opacity="0.4"/>
    <text x="296" y="432" font-family="monospace" font-size="8" fill="#E8E9EB">Data Platform · $3.5M</text>

    <rect x="116" y="444" width="140" height="16" rx="2" fill="#3D2BFF" opacity="0.35"/>
    <text x="268" y="456" font-family="monospace" font-size="8" fill="#E8E9EB">Analytics API · $2.9M</text>

    <rect x="116" y="468" width="115" height="16" rx="2" fill="#3D2BFF" opacity="0.3"/>
    <text x="243" y="480" font-family="monospace" font-size="8" fill="#E8E9EB">Consulting · $2.4M</text>

    <rect x="116" y="492" width="96" height="16" rx="2" fill="#3D2BFF" opacity="0.25"/>
    <text x="224" y="504" font-family="monospace" font-size="8" fill="#E8E9EB">Training · $2.0M</text>
  </g>
  <text x="96" y="556" font-family="monospace" font-size="7" fill="#555860">09:14 · 342ms</text>

  <!-- Message 3 - User followup -->
  <rect x="330" y="572" width="366" height="32" rx="12" fill="#1F2024"/>
  <text x="350" y="593" font-family="monospace" font-size="9" fill="#E8E9EB">Show YoY growth for Enterprise Suite</text>
  <text x="688" y="614" font-family="monospace" font-size="7" fill="#555860" text-anchor="end">09:15</text>

