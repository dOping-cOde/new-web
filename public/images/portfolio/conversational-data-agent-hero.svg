  <rect x="1354" y="360" width="140" height="100" rx="4" fill="#1A1B1E" stroke="#2A2B30" stroke-width="1"/>
  <text x="1424" y="384" font-family="monospace" font-size="9" fill="#8A8C92" text-anchor="middle">dbt Cloud</text>
  <text x="1424" y="402" font-family="monospace" font-size="7" fill="#555860" text-anchor="middle">480 models</text>
  <text x="1424" y="418" font-family="monospace" font-size="7" fill="#555860" text-anchor="middle">Lineage graph</text>
  <text x="1424" y="434" font-family="monospace" font-size="7" fill="#4ADE80" text-anchor="middle">● CONNECTED</text>
  <text x="1424" y="452" font-family="monospace" font-size="7" fill="#555860" text-anchor="middle">Metadata sync</text>

