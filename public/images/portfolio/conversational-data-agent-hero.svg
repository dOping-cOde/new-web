  <line x1="116" y1="730" x2="480" y2="730" stroke="#2A2B30" stroke-width="0.5"/>
  <text x="116" y="742" font-family="monospace" font-size="7" fill="#555860">2018</text>
  <text x="476" y="742" font-family="monospace" font-size="7" fill="#555860" text-anchor="end">2024</text>
  <text x="380" y="668" font-family="monospace" font-size="8" fill="#4ADE80">+127% (6yr CAGR: 14.7%)</text>
  <text x="96" y="756" font-family="monospace" font-size="7" fill="#555860">09:15 · 218ms</text>

  <!-- NL → SQL flow diagram - right panel -->
  <rect x="800" y="100" width="720" height="200" rx="4" fill="#0F1018" stroke="#1F2024" stroke-width="1"/>
  <rect x="800" y="100" width="720" height="26" rx="4" fill="#1A1B1E"/>
  <text x="816" y="118" font-family="monospace" font-size="10" fill="#8A8C92" letter-spacing="1">NATURAL LANGUAGE → SQL PIPELINE</text>

  <!-- Pipeline steps -->
  <!-- Step 1 -->
  <rect x="820" y="142" width="100" height="40" rx="4" fill="#1A1B1E" stroke="#2A2B30" stroke-width="1"/>
  <text x="870" y="158" font-family="monospace" font-size="8" fill="#8A8C92" text-anchor="middle">NL QUERY</text>
