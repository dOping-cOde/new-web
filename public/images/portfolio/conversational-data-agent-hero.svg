  <rect x="96" y="628" width="400" height="120" rx="12" fill="#1A1B1E" stroke="#1F2024" stroke-width="1"/>
  <text x="116" y="648" font-family="monospace" font-size="9" fill="#E8E9EB">Enterprise Suite YoY growth:</text>
