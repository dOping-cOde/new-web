  <g filter="url(#node-shadow)">
    <rect x="380" y="75" width="100" height="40" rx="8" fill="#FFFFFF" stroke="#E8E6DF" stroke-width="1.5"/>
  </g>
  <text x="430" y="99" font-family="sans-serif" font-size="10" fill="#0A0B0D" text-anchor="middle">Tableau</text>

  <g filter="url(#node-shadow)">
    <rect x="380" y="125" width="100" height="40" rx="8" fill="#FFFFFF" stroke="#E8E6DF" stroke-width="1.5"/>
  </g>
  <text x="430" y="149" font-family="sans-serif" font-size="10" fill="#0A0B0D" text-anchor="middle">Power BI</text>

  <g filter="url(#node-shadow)">
    <rect x="380" y="175" width="100" height="40" rx="8" fill="#FFFFFF" stroke="#E8E6DF" stroke-width="1.5"/>
  </g>
  <text x="430" y="199" font-family="sans-serif" font-size="10" fill="#0A0B0D" text-anchor="middle">Excel</text>

  <g filter="url(#node-shadow)">
    <rect x="380" y="225" width="100" height="40" rx="8" fill="#FFFFFF" stroke="#E8E6DF" stroke-width="1.5"/>
  </g>
  <text x="430" y="249" font-family="sans-serif" font-size="10" fill="#0A0B0D" text-anchor="middle">Looker</text>

  <!-- ─── Arrows: Data Sources → Engine ─── -->
  <path d="M 120 95 L 168 140" fill="none" stroke="#FFD400" stroke-width="1.5" marker-end="url(#arrow)" opacity="0.6"/>
  <path d="M 120 145 L 168 165" fill="none" stroke="#FFD400" stroke-width="1.5" marker-end="url(#arrow)" opacity="0.6"/>
  <path d="M 120 195 L 168 195" fill="none" stroke="#FFD400" stroke-width="1.5" marker-end="url(#arrow)" opacity="0.6"/>
  <path d="M 120 245 L 168 230" fill="none" stroke="#FFD400" stroke-width="1.5" marker-end="url(#arrow)" opacity="0.6"/>

  <!-- ─── Arrows: Engine → BI Tools ─── -->
  <path d="M 332 140 L 378 95" fill="none" stroke="#FFD400" stroke-width="1.5" marker-end="url(#arrow)" opacity="0.6"/>
  <path d="M 332 165 L 378 145" fill="none" stroke="#FFD400" stroke-width="1.5" marker-end="url(#arrow)" opacity="0.6"/>
  <path d="M 332 195 L 378 195" fill="none" stroke="#FFD400" stroke-width="1.5" marker-end="url(#arrow)" opacity="0.6"/>
  <path d="M 332 230 L 378 245" fill="none" stroke="#FFD400" stroke-width="1.5" marker-end="url(#arrow)" opacity="0.6"/>

  <!-- ─── BOTTOM: Governance bar ─── -->
  <g filter="url(#node-shadow)">
    <rect x="70" y="305" width="360" height="50" rx="10" fill="#FFFFFF" stroke="#FFD400" stroke-width="1.5"/>
