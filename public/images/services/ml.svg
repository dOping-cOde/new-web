<svg xmlns="http://www.w3.org/2000/svg" width="500" height="400" viewBox="0 0 500 400" fill="none" role="img" aria-label="Machine learning solutions">
  <rect width="500" height="400" fill="#151517"/>
  <!-- axes -->
  <line x1="80" y1="70" x2="80" y2="300" stroke="#2A2A2E" stroke-width="1.5"/>
  <line x1="80" y1="300" x2="420" y2="300" stroke="#2A2A2E" stroke-width="1.5"/>
  <!-- scatter -->
  <g fill="#9C9CA2">
    <circle cx="120" cy="270" r="5"/><circle cx="150" cy="248" r="5"/><circle cx="140" cy="262" r="5"/>
    <circle cx="190" cy="234" r="5"/><circle cx="210" cy="210" r="5"/><circle cx="225" cy="226" r="5"/>
    <circle cx="265" cy="196" r="5"/><circle cx="290" cy="178" r="5"/><circle cx="300" cy="190" r="5"/>
    <circle cx="340" cy="156" r="5"/><circle cx="360" cy="140" r="5"/><circle cx="375" cy="150" r="5"/>
  </g>
  <!-- trend line -->
  <path d="M110 278 L390 128" stroke="#FFD400" stroke-width="3" stroke-linecap="round"/>
  <!-- lifecycle chips -->
  <g font-family="monospace" font-size="11" fill="#0A0A0A" text-anchor="middle">
    <rect x="92" y="332" width="70" height="28" rx="14" fill="#FFD400"/><text x="127" y="350">train</text>
  </g>
  <g font-family="monospace" font-size="11" fill="#F4F4F2" text-anchor="middle">
    <rect x="176" y="332" width="80" height="28" rx="14" fill="#1C1C1F" stroke="#2A2A2E"/><text x="216" y="350">deploy</text>
    <rect x="270" y="332" width="84" height="28" rx="14" fill="#1C1C1F" stroke="#2A2A2E"/><text x="312" y="350">monitor</text>
    <rect x="368" y="332" width="84" height="28" rx="14" fill="#1C1C1F" stroke="#2A2A2E"/><text x="410" y="350">retrain</text>
  </g>
</svg>
